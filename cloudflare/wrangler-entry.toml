# 入口 Worker：boardgamematch.com.tw
# 部署：npx wrangler deploy -c wrangler-entry.toml
#
# ⚠️ 若網站出現 403 / 0 筆 / 帳號不見：入口 Worker 轉發 API 時需要帶 X-Api-Key。
# 請在「部署前」設定 Secret（值要與 mbti-boardgame-api 的 API_SECRET 相同）：
#   npx wrangler secret put BOARDGAME_API_KEY -c wrangler-entry.toml
# 然後重新部署：npx wrangler deploy -c wrangler-entry.toml

name = "boardgamematch-entry"
main = "entry-worker.js"
compatibility_date = "2024-01-01"

# 自訂網域：必須保留，否則 /tables/* 不會轉到 API
[[routes]]
pattern = "boardgamematch.com.tw/*"
zone_name = "boardgamematch.com.tw"
