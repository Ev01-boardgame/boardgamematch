<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頭貼 Base64 佔用報表 - 管理後台</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .report-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem 2rem; margin-bottom: 1.5rem; border-radius: 1rem; }
        .report-header h1 { margin: 0 0 0.5rem 0; font-size: 1.4rem; }
        .report-header p { margin: 0; opacity: 0.9; font-size: 0.9rem; }
        .report-table { background: var(--card-bg); border-radius: 1rem; overflow-x: auto; box-shadow: var(--shadow-md); }
        .report-table table { width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .report-table th { background: var(--bg-light); font-weight: 600; }
        .report-table tr:hover { background: var(--bg-light); }
        .size-kb { font-family: monospace; color: #c0392b; }
        .empty { color: var(--text-light); padding: 2rem; text-align: center; }
        .loading { padding: 2rem; text-align: center; color: var(--text-light); }
        .summary { margin-bottom: 1rem; padding: 1rem; background: var(--bg-light); border-radius: 0.5rem; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 900px; margin: 2rem auto;">
        <div class="report-header">
            <h1>📊 頭貼仍為 Base64 的帳號</h1>
            <p>以下使用者的頭貼仍存在 D1（avatar_url 為 data:image/...），佔用較多空間。建議請他們到個人頁重新上傳頭貼，會改存 R2。</p>
        </div>
        <div class="summary" id="summary" style="display: none;"></div>
        <div class="report-table">
            <div id="content" class="loading">⏳ 載入中...</div>
        </div>
        <p style="margin-top: 1rem;"><a href="admin.html" style="color: var(--primary-color);">← 回管理後台</a></p>
    </div>
    <script>
        (async function() {
            const content = document.getElementById('content');
            const summaryEl = document.getElementById('summary');
            let allUsers = [];
            let page = 1;
            const limit = 200;
            while (true) {
                const r = await fetch(`tables/users?page=${page}&limit=${limit}`);
                if (!r.ok) {
                    content.innerHTML = '<div class="empty">❌ 無法載入使用者列表（' + r.status + '）</div>';
                    return;
                }
                const data = await r.json();
                const list = data.data || [];
                allUsers = allUsers.concat(list);
                if (list.length < limit) break;
                page++;
            }
            const base64Users = allUsers.filter(u => u.avatar_url && typeof u.avatar_url === 'string' && u.avatar_url.startsWith('data:image/'));
            base64Users.sort((a, b) => (b.avatar_url?.length || 0) - (a.avatar_url?.length || 0));
            const totalBytes = base64Users.reduce((sum, u) => sum + (u.avatar_url?.length || 0), 0);
            summaryEl.style.display = 'block';
            summaryEl.innerHTML = `共 <strong>${allUsers.length}</strong> 位使用者，其中 <strong>${base64Users.length}</strong> 位頭貼仍為 Base64，合計約 <strong>${(totalBytes / 1024).toFixed(1)} KB</strong>（${(totalBytes / 1024 / 1024).toFixed(2)} MB）`;
            if (base64Users.length === 0) {
                content.innerHTML = '<div class="empty">✅ 沒有使用者使用 Base64 頭貼。</div>';
                return;
            }
            content.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>暱稱 / 帳號</th>
                            <th>email</th>
                            <th>頭貼大小</th>
                            <th>user id</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${base64Users.map((u, i) => {
                            const len = u.avatar_url ? u.avatar_url.length : 0;
                            const approxBytes = Math.ceil((len - (u.avatar_url.indexOf(',') + 1)) * 3 / 4);
                            const kb = (approxBytes / 1024).toFixed(1);
                            return `<tr>
                                <td>${i + 1}</td>
                                <td>${escapeHtml(u.username || u.nickname || '-')}</td>
                                <td style="font-size:0.85rem;">${escapeHtml(u.email || '-')}</td>
                                <td class="size-kb">${kb} KB</td>
                                <td style="font-size:0.8rem; color:var(--text-light);">${escapeHtml((u.id || '').slice(0, 12))}…</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;
        })();
        function escapeHtml(s) {
            if (s == null) return '';
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }
    </script>
</body>
</html>
